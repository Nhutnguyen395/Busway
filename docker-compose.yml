version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: transit-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=transit_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: